# Spring Boot Application Properties - Default Configuration
# This is used as fallback when environment-specific profiles are not specified

spring:
  application:
    name: service-computing-backend
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 10
  
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.comp4442: INFO
